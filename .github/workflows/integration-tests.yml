name: Integration tests

on:
  push:
    branches:
      - master
      - 'branch-**'
    paths-ignore:
      - docs/*
      - examples/*
      - scripts/*
      - .gitignore
      - '*.rst'
      - '*.ini'
      - LICENSE
      - .github/dependabot.yml
      - .github/pull_request_template.md
        - "*.md"
        - .github/workflows/docs-*
  pull_request:
    paths-ignore:
     - docs/*
     - examples/*
     - scripts/*
     - .gitignore
     - '*.rst'
     - '*.ini'
     - LICENSE
     - .github/dependabot.yml
     - .github/pull_request_template.md
      - "*.md"
      - .github/workflows/docs-*
  workflow_dispatch:

jobs:
  tests:
    name: test ${{ matrix.event_loop_manager }} (${{ matrix.python-version }})
    if: "!contains(github.event.pull_request.labels.*.name, 'disable-integration-tests')"
    runs-on: ubuntu-24.04
    env:
      SCYLLA_VERSION: release:2026.1
    strategy:
      fail-fast: false
      matrix:
        java-version: [8]
        python-version: ["3.11", "3.12", "3.13", "3.14", "3.14t"]
        event_loop_manager: ["libev", "asyncio", "asyncore"]
        exclude:
          - python-version: "3.12"
            event_loop_manager: "asyncore"
          - python-version: "3.13"
            event_loop_manager: "asyncore"
          - python-version: "3.14"
            event_loop_manager: "asyncore"
          - python-version: "3.14t"
            event_loop_manager: "asyncore"

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'adopt'

    - name: Install libev
      run: sudo apt-get install libev4 libev-dev

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        python-version: ${{ matrix.python-version }}

    # This is to get honest accounting of test time vs download time vs build time.
    # Not strictly necessary for running tests.
    - name: Build driver
      run: uv sync

    - name: Cache Scylla download
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.ccm/repository
        key: scylla-${{ env.SCYLLA_VERSION }}-${{ runner.os }}

    # This is to get honest accounting of test time vs download time vs build time.
    # Not strictly necessary for running tests.
    - name: Download Scylla
      run: |
        uv run ccm create scylla-driver-temp -n 1 --scylla --version ${SCYLLA_VERSION}
        uv run ccm remove

    - name: Test with pytest
      env:
        EVENT_LOOP_MANAGER: ${{ matrix.event_loop_manager }}
        INTEGRATION_LOG_ARTIFACT_DIR: integration-test-logs
        PROTOCOL_VERSION: 4
      run: |
        if [[ "${{ matrix.python-version }}" =~ t$ ]]; then
          export PYTHON_GIL=0
        fi
        uv run pytest -v tests/integration/standard/ tests/integration/cqlengine/

    - name: Upload ccm logs on failure
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: integration-logs-${{ matrix.event_loop_manager }}-${{ matrix.python-version }}
        path: |
          integration-test-logs/**
          tests/integration/ccm/**/*.conf
          tests/integration/ccm/**/*.log
          tests/integration/ccm/**/*.yaml
          tests/integration/ccm/**/*.yml
          tests/integration/ccm/**/conf/**
          tests/integration/ccm/**/logs/**
          /home/runner/.ccm/**/*.conf
          /home/runner/.ccm/**/*.log
          /home/runner/.ccm/**/*.yaml
          /home/runner/.ccm/**/*.yml
          /home/runner/.ccm/**/conf/**
          /home/runner/.ccm/**/logs/**
        if-no-files-found: warn
        include-hidden-files: true
        retention-days: 14
